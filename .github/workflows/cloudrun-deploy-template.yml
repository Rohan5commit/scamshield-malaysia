name: Cloud Run Deploy Template

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
      FIRESTORE_PROJECT_ID: ${{ secrets.FIRESTORE_PROJECT_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Check required deployment secrets
        id: check
        shell: bash
        run: |
          missing=()

          for name in \
            GCP_PROJECT_ID \
            GCP_REGION \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            GCP_SERVICE_ACCOUNT_EMAIL \
            CLOUD_RUN_SERVICE
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloud Run template is disabled until these GitHub secrets are configured:"
            printf ' - %s\n' "${missing[@]}"
            echo "Optional secrets:"
            echo " - FIRESTORE_PROJECT_ID"
            echo " - GEMINI_API_KEY"
            exit 0
          fi

          if [ -n "$GEMINI_API_KEY" ]; then
            echo "mock_ai=false" >> "$GITHUB_OUTPUT"
          else
            echo "mock_ai=true" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$FIRESTORE_PROJECT_ID" ]; then
            echo "storage_provider=firestore" >> "$GITHUB_OUTPUT"
          else
            echo "storage_provider=local" >> "$GITHUB_OUTPUT"
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        if: steps.check.outputs.ready == 'true'

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        if: steps.check.outputs.ready == 'true'
        with:
          node-version: 22
          cache: npm

      - if: steps.check.outputs.ready == 'true'
        run: npm ci

      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        if: steps.check.outputs.ready == 'true'
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT_EMAIL }}

      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f
        if: steps.check.outputs.ready == 'true'

      - uses: google-github-actions/deploy-cloudrun@251330ba9a8a34bfbc1622895f42e1d53fd14522
        if: steps.check.outputs.ready == 'true'
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ env.GCP_REGION }}
          source: .
          flags: >-
            --allow-unauthenticated
            --concurrency=10
            --max-instances=1
            --min-instances=0
            --memory=512Mi
            --cpu=1
            --timeout=60
          env_vars: |
            NODE_ENV=production
            MOCK_AI=${{ steps.check.outputs.mock_ai }}
            DEFAULT_MODEL=gemini-2.5-flash-lite
            STORAGE_PROVIDER=${{ steps.check.outputs.storage_provider }}
            FIRESTORE_PROJECT_ID=${{ env.FIRESTORE_PROJECT_ID }}
            FIRESTORE_COLLECTION=scamshield_reports
            LOG_LEVEL=info
            RATE_LIMIT_WINDOW_MS=60000
            RATE_LIMIT_MAX=60
            ANALYZE_RATE_LIMIT_MAX=8
            REPORTS_READ_RATE_LIMIT_MAX=30
            REPORTS_WRITE_RATE_LIMIT_WINDOW_MS=900000
            REPORTS_WRITE_RATE_LIMIT_MAX=5
            RETRIEVAL_USER_REPORT_LIMIT=15
            GEMINI_API_KEY=${{ env.GEMINI_API_KEY }}
