name: Cloud Run Deploy Template

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
      FIRESTORE_PROJECT_ID: ${{ secrets.FIRESTORE_PROJECT_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Check required deployment secrets
        id: check
        shell: bash
        run: |
          missing=()

          for name in \
            GCP_PROJECT_ID \
            GCP_REGION \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            GCP_SERVICE_ACCOUNT_EMAIL \
            CLOUD_RUN_SERVICE
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloud Run template is disabled until these GitHub secrets are configured:"
            printf ' - %s\n' "${missing[@]}"
            echo "Optional secrets:"
            echo " - FIRESTORE_PROJECT_ID"
            echo " - GEMINI_API_KEY"
            exit 0
          fi

          if [ -n "$GEMINI_API_KEY" ]; then
            echo "mock_ai=false" >> "$GITHUB_OUTPUT"
          else
            echo "mock_ai=true" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$FIRESTORE_PROJECT_ID" ]; then
            echo "storage_provider=firestore" >> "$GITHUB_OUTPUT"
          else
            echo "storage_provider=local" >> "$GITHUB_OUTPUT"
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.check.outputs.ready == 'true'

      - uses: actions/setup-node@v4
        if: steps.check.outputs.ready == 'true'
        with:
          node-version: 22
          cache: npm

      - if: steps.check.outputs.ready == 'true'
        run: npm ci

      - uses: google-github-actions/auth@v2
        if: steps.check.outputs.ready == 'true'
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2
        if: steps.check.outputs.ready == 'true'

      - uses: google-github-actions/deploy-cloudrun@v2
        if: steps.check.outputs.ready == 'true'
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ env.GCP_REGION }}
          source: .
          flags: >-
            --allow-unauthenticated
            --set-env-vars=NODE_ENV=production,PORT=8080,MOCK_AI=${{ steps.check.outputs.mock_ai }},STORAGE_PROVIDER=${{ steps.check.outputs.storage_provider }},FIRESTORE_PROJECT_ID=${{ env.FIRESTORE_PROJECT_ID }}
          env_vars: |
            GEMINI_API_KEY=${{ env.GEMINI_API_KEY }}
