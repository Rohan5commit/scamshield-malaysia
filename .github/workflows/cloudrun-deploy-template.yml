name: Cloud Run Deploy Template

on:
  workflow_dispatch:

jobs:
  instructions:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Required GitHub secrets:"
          echo "GCP_PROJECT_ID"
          echo "GCP_REGION"
          echo "GCP_WORKLOAD_IDENTITY_PROVIDER"
          echo "GCP_SERVICE_ACCOUNT_EMAIL"
          echo "CLOUD_RUN_SERVICE"
          echo "FIRESTORE_PROJECT_ID (optional if using local storage)"
          echo "GEMINI_API_KEY (optional if you want live Gemini mode in Cloud Run)"

  deploy:
    if: ${{ secrets.GCP_PROJECT_ID != '' && secrets.GCP_REGION != '' && secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT_EMAIL != '' && secrets.CLOUD_RUN_SERVICE != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service: ${{ secrets.CLOUD_RUN_SERVICE }}
          region: ${{ secrets.GCP_REGION }}
          source: .
          flags: >-
            --allow-unauthenticated
            --set-env-vars=NODE_ENV=production,PORT=8080,MOCK_AI=${{ secrets.GEMINI_API_KEY == '' && 'true' || 'false' }},STORAGE_PROVIDER=${{ secrets.FIRESTORE_PROJECT_ID == '' && 'local' || 'firestore' }},FIRESTORE_PROJECT_ID=${{ secrets.FIRESTORE_PROJECT_ID }}
          env_vars: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
